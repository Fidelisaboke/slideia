[project]
name = "backend"
version = "0.6.0"
description = "Slideia Backend API"
authors = [{ name = "Fidelisaboke" }]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "dotenv>=0.9.9",
    "fastapi>=0.128.0",
    "fastmcp>=2.14.3",
    "httpx>=0.28.1",
    "pypdf2>=3.0.1",
    "python-docx>=1.2.0",
    "python-multipart>=0.0.22",
    "python-pptx>=1.0.2",
    "redis>=7.1.0",
    "reportlab>=4.4.10",
    "requests>=2.32.5",
    "uvicorn>=0.40.0",
]

[dependency-groups]
dev = [
    "ruff>=0.14.13",
]
test = [
    "coverage>=7.13.1",
    "pytest>=9.0.2",
    "pytest-asyncio>=0.25.3",
    "pytest-cov>=7.0.0",
]
