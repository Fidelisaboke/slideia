name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build_test_lint:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install Node dependencies
        run: pnpm install

      - name: Install Python dependencies
        run: uv sync --all-packages --all-groups

      - name: Load test environment variables from GitHub Secrets
        run: echo "${{ secrets.BACKEND_ENV_TEST_FILE }}" > apps/backend/.env.test

      - name: Install backend project in editable mode
        run: uv pip install -e apps/backend

      - name: Run checks with Turbo
        run: pnpm turbo run test lint build

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/backend/coverage.xml
          fail_ci_if_error: false
