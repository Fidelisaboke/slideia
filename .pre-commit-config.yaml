# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
# Update hooks by running: pre-commit autoupdate
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      # Run the linter.
      - id: ruff
        args: [--fix]
      # Run the formatter.
      - id: ruff-format

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: pnpm exec prettier --write
        language: system
        types_or:
          [javascript, jsx, ts, tsx, css, scss, html, json, yaml, markdown]
        pass_filenames: true

      - id: eslint
        name: eslint
        entry: bash -c 'cd apps/frontend && pnpm exec eslint --fix "${@/apps\/frontend\//}"' --
        language: system
        files: ^apps/frontend/
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: true
